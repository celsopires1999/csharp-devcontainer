services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - USER_UID=${UID:-1000}
        - USER_GID=${GID:-1000}
        - DOCKER_GROUP_ID=${DOCKER_GROUP_ID:-999}
    volumes:
      - .:/home/developer/app
      - /var/run/docker.sock:/var/run/docker.sock
    tty: true
    extra_hosts:
      - host.docker.internal:host-gateway

